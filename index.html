<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>SlipScanner - Powered By Dennisys</title>
    <!-- React & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- Dexie (IndexedDB) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <!-- Tesseract.js OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #111827 100%);
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }
        .header {
            background: linear-gradient(135deg, #1E2A47, #131C2E);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.4);
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(120deg, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(15, 23, 42, 0.8);
            padding: 0.75rem 0;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            flex-wrap: wrap;
        }
        .nav-btn {
            background: none;
            border: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #CBD5E1;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 0.2rem;
        }
        .nav-btn.active {
            background: linear-gradient(120deg, #3B82F6, #8B5CF6);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .content {
            padding: 1.5rem;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            border: 1px solid rgba(139, 92, 246, 0.25);
            transition: transform 0.1s;
        }
        input, button {
            background: #1E293B;
            border: 1px solid #334155;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            color: #F1F5F9;
            font-size: 0.95rem;
            width: 100%;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }
        button {
            background: linear-gradient(120deg, #3B82F6, #8B5CF6);
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.97);
        }
        .flex-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .chip {
            background: #1E293B;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #334155;
        }
        .chip.active {
            background: linear-gradient(120deg, #3B82F6, #8B5CF6);
            border-color: transparent;
            color: white;
        }
        .receipt-item {
            background: #0F172A;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #8B5CF6;
        }
        .receipt-info h4 {
            font-size: 1rem;
            font-weight: 600;
        }
        .receipt-info p {
            font-size: 0.75rem;
            color: #94A3B8;
        }
        .delete-btn {
            background: #DC2626;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            width: auto;
            margin: 0;
        }
        .footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #64748B;
            border-top: 1px solid rgba(139,92,246,0.2);
            background: rgba(15,23,42,0.5);
        }
        .total {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #60A5FA, #C084FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .error {
            color: #F87171;
            font-size: 0.75rem;
            margin-top: -0.5rem;
            margin-bottom: 0.75rem;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .auth-toggle {
            background: none;
            border: none;
            color: #A78BFA;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-decoration: underline;
            cursor: pointer;
            width: auto;
        }
        video {
            width: 100%;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            background: #000;
        }
        .camera-error {
            background: rgba(220,38,38,0.2);
            padding: 0.8rem;
            border-radius: 1rem;
            margin: 1rem 0;
            text-align: center;
            color: #F87171;
        }
        @media (max-width: 550px) {
            body {
                padding: 0.8rem;
            }
            .content {
                padding: 1rem;
            }
            .nav-btn {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .total {
                font-size: 1.8rem;
            }
        }
        @media (min-width: 1200px) {
            .app-container {
                max-width: 800px;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    // ---------- IndexedDB ----------
    const db = new Dexie('SlipScannerDB');
    db.version(1).stores({
        users: '++id, email',
        receipts: '++id, userId, date, shopName, price'
    });

    // Simple hash for demo (fast, local only)
    const hashPassword = (pwd) => btoa(pwd + "slipscanner_salt");
    const comparePassword = (plain, hash) => hashPassword(plain) === hash;

    function parseReceiptText(text) {
        const lines = text.split('\n').filter(l => l.trim().length > 0);
        let shopName = lines.length > 0 ? lines[0].trim() : "Unknown Shop";
        if (shopName.length > 40) shopName = shopName.substring(0, 40);
        let price = 0;
        const priceRegex = /[RZAR]?\s*(\d+\.\d{2})/i;
        for (let line of lines) {
            const match = line.match(priceRegex);
            if (match) { price = parseFloat(match[1]); break; }
        }
        let dateObj = new Date();
        const dateRegex = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/;
        for (let line of lines) {
            const match = line.match(dateRegex);
            if (match) {
                const parsed = new Date(match[1]);
                if (!isNaN(parsed)) dateObj = parsed;
                break;
            }
        }
        return { shopName, price, date: dateObj, fullJson: JSON.stringify({ raw: text, lines }) };
    }

    const { useState, useEffect, useRef, createContext, useContext, useCallback } = React;
    const AuthContext = createContext(null);
    function useAuth() { return useContext(AuthContext); }

    function App() {
        const [currentUser, setCurrentUser] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
            const stored = sessionStorage.getItem('userId');
            if (stored) {
                db.users.get(parseInt(stored)).then(u => {
                    if (u) setCurrentUser({ id: u.id, email: u.email, fullName: u.fullName });
                    setLoading(false);
                }).catch(() => setLoading(false));
            } else setLoading(false);
        }, []);
        const login = async (email, pwd) => {
            try {
                const user = await db.users.where('email').equals(email).first();
                if (user && comparePassword(pwd, user.passwordHash)) {
                    const data = { id: user.id, email: user.email, fullName: user.fullName };
                    setCurrentUser(data);
                    sessionStorage.setItem('userId', user.id);
                    return true;
                }
                return false;
            } catch (err) {
                console.error(err);
                return false;
            }
        };
        const signup = async (fullName, email, pwd) => {
            try {
                const existing = await db.users.where('email').equals(email).first();
                if (existing) return false;
                const hash = hashPassword(pwd);
                const id = await db.users.add({ email, passwordHash: hash, fullName });
                const data = { id, email, fullName };
                setCurrentUser(data);
                sessionStorage.setItem('userId', id);
                return true;
            } catch (err) {
                console.error(err);
                return false;
            }
        };
        const logout = () => {
            setCurrentUser(null);
            sessionStorage.removeItem('userId');
        };
        if (loading) return <div style={{textAlign:'center', padding:'3rem', color:'white'}}>🌀 Loading...</div>;
        if (!currentUser) return <AuthScreen onLogin={login} onSignup={signup} />;
        return (
            <AuthContext.Provider value={{ user: currentUser, logout }}>
                <AuthenticatedApp />
            </AuthContext.Provider>
        );
    }

    function AuthScreen({ onLogin, onSignup }) {
        const [isLogin, setIsLogin] = useState(true);
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [fullName, setFullName] = useState('');
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setError('');
            setLoading(true);
            let ok;
            if (isLogin) {
                ok = await onLogin(email, password);
                if (!ok) setError('Invalid email or password');
            } else {
                if (!fullName.trim()) { setError('Full name required'); setLoading(false); return; }
                ok = await onSignup(fullName, email, password);
                if (!ok) setError('Email already exists');
            }
            setLoading(false);
        };

        return (
            <div className="app-container">
                <div className="header"><h1>✨ SlipScanner</h1></div>
                <div className="content">
                    <div className="auth-card">
                        <h2 style={{marginBottom:'1rem', color:'#E2E8F0'}}>{isLogin ? 'Welcome back' : 'Create account'}</h2>
                        <form onSubmit={handleSubmit}>
                            {!isLogin && <input type="text" placeholder="Full name" value={fullName} onChange={e => setFullName(e.target.value)} required />}
                            <input type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} required />
                            <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required />
                            {error && <div className="error">{error}</div>}
                            <button type="submit" disabled={loading}>{loading ? 'Please wait...' : (isLogin ? 'Login' : 'Sign up')}</button>
                        </form>
                        <button className="auth-toggle" onClick={() => { setIsLogin(!isLogin); setError(''); }}>
                            {isLogin ? "Don't have an account? Sign up" : "Already have an account? Log in"}
                        </button>
                    </div>
                </div>
                <div className="footer">Powered By Dennisys</div>
            </div>
        );
    }

    function AuthenticatedApp() {
        const [tab, setTab] = useState('dashboard');
        const { logout } = useAuth();
        return (
            <div className="app-container">
                <div className="header"><h1>🧾 SlipScanner</h1></div>
                <div className="nav-bar">
                    <button className={`nav-btn ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => setTab('dashboard')}>📊 Dashboard</button>
                    <button className={`nav-btn ${tab === 'scan' ? 'active' : ''}`} onClick={() => setTab('scan')}>📸 Scan</button>
                    <button className={`nav-btn ${tab === 'slips' ? 'active' : ''}`} onClick={() => setTab('slips')}>📋 Slips</button>
                    <button className={`nav-btn ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>⚙️ Settings</button>
                </div>
                <div className="content">
                    {tab === 'dashboard' && <Dashboard />}
                    {tab === 'scan' && <ScanTab />}
                    {tab === 'slips' && <SlipsList />}
                    {tab === 'settings' && <SettingsTab logout={logout} />}
                </div>
                <div className="footer">Powered By Dennisys</div>
            </div>
        );
    }

    function Dashboard() {
        const { user } = useAuth();
        const [receipts, setReceipts] = useState([]);
        const [filter, setFilter] = useState('weekly');
        const [customDate, setCustomDate] = useState('');
        const [totalSpent, setTotalSpent] = useState(0);
        const [slipCount, setSlipCount] = useState(0);

        const loadData = useCallback(async () => {
            let all = await db.receipts.where('userId').equals(user.id).toArray();
            all.sort((a,b) => new Date(b.date) - new Date(a.date));
            let filtered = [];
            const now = new Date();
            if (filter === 'daily') {
                const start = new Date(now.setHours(0,0,0,0));
                const end = new Date(now.setHours(23,59,59,999));
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'weekly') {
                const start = new Date(now);
                start.setDate(now.getDate() - now.getDay() + (now.getDay()===0?-6:1));
                start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate()+6);
                end.setHours(23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'monthly') {
                const start = new Date(now.getFullYear(), now.getMonth(), 1);
                const end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'yearly') {
                const start = new Date(now.getFullYear(), 0, 1);
                const end = new Date(now.getFullYear(), 11, 31, 23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'custom' && customDate) {
                const target = new Date(customDate);
                const start = new Date(target.setHours(0,0,0,0));
                const end = new Date(target.setHours(23,59,59,999));
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else {
                filtered = all;
            }
            const total = filtered.reduce((s,r) => s + (r.price || 0), 0);
            setTotalSpent(total);
            setSlipCount(filtered.length);
            setReceipts(filtered.slice(0, 10));
        }, [user.id, filter, customDate]);

        useEffect(() => { loadData(); }, [loadData]);

        return (
            <>
                <div className="card">
                    <div className="flex-row" style={{marginBottom:'1rem'}}>
                        {['daily','weekly','monthly','yearly'].map(f => (
                            <span key={f} className={`chip ${filter === f ? 'active' : ''}`} onClick={() => { setFilter(f); setCustomDate(''); }}>{f}</span>
                        ))}
                        <span className={`chip ${filter === 'custom' ? 'active' : ''}`} onClick={() => setFilter('custom')}>📅 Custom</span>
                    </div>
                    {filter === 'custom' && <input type="date" value={customDate} onChange={e => setCustomDate(e.target.value)} style={{marginBottom:'1rem'}} />}
                    <div className="total">R {totalSpent.toFixed(2)}</div>
                    <div style={{marginTop:'0.5rem'}}>{slipCount} receipt(s) in period</div>
                </div>
                <div className="card">
                    <h3 style={{marginBottom:'0.8rem'}}>📌 Recent receipts</h3>
                    {receipts.length === 0 && <p>No receipts yet. Scan one!</p>}
                    {receipts.map(r => (
                        <div key={r.id} className="receipt-item">
                            <div className="receipt-info">
                                <h4>{r.shopName}</h4>
                                <p>{new Date(r.date).toLocaleDateString()} • R {r.price.toFixed(2)}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </>
        );
    }

    function ScanTab() {
        const { user } = useAuth();
        const [processing, setProcessing] = useState(false);
        const [preview, setPreview] = useState(null);
        const [ocrResult, setOcrResult] = useState(null);
        const [cameraActive, setCameraActive] = useState(false);
        const [cameraError, setCameraError] = useState(null);
        const videoRef = useRef(null);
        const canvasRef = useRef(null);
        const streamRef = useRef(null);

        const startCamera = async () => {
            setCameraError(null);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                if (videoRef.current) {
                    videoRef.current.srcObject = stream;
                    streamRef.current = stream;
                    setCameraActive(true);
                }
            } catch (err) {
                console.error(err);
                setCameraError('Camera permission denied or not available. Please allow camera access and try again, or use file upload.');
            }
        };

        const stopCamera = () => {
            if (streamRef.current) {
                streamRef.current.getTracks().forEach(track => track.stop());
                streamRef.current = null;
            }
            setCameraActive(false);
        };

        const capturePhoto = () => {
            if (videoRef.current && canvasRef.current) {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(async (blob) => {
                    setPreview(URL.createObjectURL(blob));
                    setProcessing(true);
                    try {
                        const { data: { text } } = await Tesseract.recognize(blob, 'eng');
                        const parsed = parseReceiptText(text);
                        setOcrResult(parsed);
                    } catch (err) {
                        alert('OCR error: ' + err.message);
                    } finally {
                        setProcessing(false);
                        stopCamera();
                    }
                }, 'image/jpeg');
            }
        };

        const handleFileUpload = async (file) => {
            if (!file) return;
            setPreview(URL.createObjectURL(file));
            setProcessing(true);
            setOcrResult(null);
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                const parsed = parseReceiptText(text);
                setOcrResult(parsed);
            } catch (err) {
                alert('OCR error: ' + err.message);
            } finally {
                setProcessing(false);
            }
        };

        const saveSlip = async () => {
            if (!ocrResult) return;
            await db.receipts.add({
                userId: user.id,
                shopName: ocrResult.shopName,
                price: ocrResult.price,
                date: ocrResult.date,
                fullJson: ocrResult.fullJson,
                createdAt: new Date()
            });
            alert('✅ Receipt saved!');
            setPreview(null);
            setOcrResult(null);
            setCameraActive(false);
            if (streamRef.current) stopCamera();
        };

        useEffect(() => {
            return () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                }
            };
        }, []);

        return (
            <div className="card">
                <h3>📸 Scan receipt</h3>
                {!cameraActive ? (
                    <div>
                        <button onClick={startCamera}>📷 Open Camera</button>
                        {cameraError && <div className="camera-error">{cameraError}</div>}
                        <div style={{margin: '1rem 0', textAlign: 'center', color: '#94A3B8'}}>or upload from gallery</div>
                        <input type="file" accept="image/*" capture="environment" onChange={e => e.target.files[0] && handleFileUpload(e.target.files[0])} />
                    </div>
                ) : (
                    <div>
                        <video ref={videoRef} autoPlay playsInline style={{width: '100%', borderRadius: '1rem'}} />
                        <canvas ref={canvasRef} style={{display: 'none'}} />
                        <button onClick={capturePhoto} style={{marginTop: '0.5rem'}}>📸 Capture</button>
                        <button onClick={stopCamera} style={{marginTop: '0.5rem', background: '#475569'}}>Cancel</button>
                    </div>
                )}
                {preview && !cameraActive && <img src={preview} alt="preview" style={{maxWidth:'100%', borderRadius:'1rem', margin:'1rem 0'}} />}
                {processing && <div>⏳ Reading text from image...</div>}
                {ocrResult && !processing && !cameraActive && (
                    <div style={{marginTop:'1rem'}}>
                        <p><strong>🏪 Shop:</strong> {ocrResult.shopName}</p>
                        <p><strong>💰 Amount:</strong> R {ocrResult.price.toFixed(2)}</p>
                        <p><strong>📅 Date:</strong> {new Date(ocrResult.date).toLocaleDateString()}</p>
                        <button onClick={saveSlip}>💾 Save receipt</button>
                    </div>
                )}
            </div>
        );
    }

    function SlipsList() {
        const { user } = useAuth();
        const [slips, setSlips] = useState([]);
        const [filter, setFilter] = useState('all');
        const [customDate, setCustomDate] = useState('');

        const loadSlips = useCallback(async () => {
            let all = await db.receipts.where('userId').equals(user.id).toArray();
            all.sort((a,b) => new Date(b.date) - new Date(a.date));
            let filtered = [...all];
            const now = new Date();
            if (filter === 'daily') {
                const start = new Date(now.setHours(0,0,0,0));
                const end = new Date(now.setHours(23,59,59,999));
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'weekly') {
                const start = new Date(now);
                start.setDate(now.getDate() - now.getDay() + (now.getDay()===0?-6:1));
                start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate()+6);
                end.setHours(23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'monthly') {
                const start = new Date(now.getFullYear(), now.getMonth(), 1);
                const end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'yearly') {
                const start = new Date(now.getFullYear(), 0, 1);
                const end = new Date(now.getFullYear(), 11, 31, 23,59,59,999);
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            } else if (filter === 'custom' && customDate) {
                const target = new Date(customDate);
                const start = new Date(target.setHours(0,0,0,0));
                const end = new Date(target.setHours(23,59,59,999));
                filtered = all.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
            }
            setSlips(filtered);
        }, [user.id, filter, customDate]);

        useEffect(() => { loadSlips(); }, [loadSlips]);

        const del = async (id) => {
            await db.receipts.delete(id);
            loadSlips();
        };

        return (
            <div className="card">
                <div className="flex-row" style={{marginBottom:'1rem'}}>
                    {['all','daily','weekly','monthly','yearly','custom'].map(f => (
                        <span key={f} className={`chip ${filter === f ? 'active' : ''}`} onClick={() => { setFilter(f); if(f!=='custom') setCustomDate(''); }}>{f}</span>
                    ))}
                </div>
                {filter === 'custom' && <input type="date" value={customDate} onChange={e => setCustomDate(e.target.value)} style={{marginBottom:'1rem'}} />}
                {slips.length === 0 && <p>📭 No receipts match.</p>}
                {slips.map(s => (
                    <div key={s.id} className="receipt-item">
                        <div className="receipt-info">
                            <h4>{s.shopName}</h4>
                            <p>{new Date(s.date).toLocaleDateString()} • R {s.price.toFixed(2)}</p>
                        </div>
                        <button className="delete-btn" onClick={() => del(s.id)}>Delete</button>
                    </div>
                ))}
            </div>
        );
    }

    function SettingsTab({ logout }) {
        const [notifEnabled, setNotifEnabled] = useState(false);
        useEffect(() => {
            if ('Notification' in window) setNotifEnabled(Notification.permission === 'granted');
        }, []);
        const requestNotif = async () => {
            if ('Notification' in window) {
                const perm = await Notification.requestPermission();
                setNotifEnabled(perm === 'granted');
                if (perm === 'granted') new Notification('SlipScanner', { body: 'Notifications active' });
            } else alert('Not supported');
        };
        const testNotif = () => {
            if (notifEnabled) new Notification('SlipScanner', { body: 'Test notification' });
            else alert('Enable notifications first');
        };
        return (
            <div className="card">
                <div style={{marginBottom:'1.5rem'}}>
                    <div className="flex-row" style={{justifyContent:'space-between'}}>
                        <span>🔔 Notifications</span>
                        <button style={{width:'auto', padding:'0.4rem 1.2rem', background: notifEnabled ? '#10B981' : '#475569'}} onClick={requestNotif}>
                            {notifEnabled ? 'Enabled' : 'Enable'}
                        </button>
                    </div>
                    <button onClick={testNotif} style={{marginTop:'0.8rem'}}>📢 Test notification</button>
                </div>
                <button onClick={logout} style={{background:'#DC2626'}}>🚪 Logout</button>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
